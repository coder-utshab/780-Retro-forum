<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-Forum</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<section class="max-w-7xl mx-auto mt-10">
    <nav class="flex justify-between items-center p-6">
   <h1 class="text-3xl font-bold">ReTro</h1>
   <button class="btn bg-purple-500 text-white">Sign In</button>
</nav>
</section>


<section class="max-w-7xl mx-auto mt-10">
  <div 
    class="text-white p-12 rounded-3xl min-h-[500px] 
           flex justify-between items-center 
           bg-cover bg-center"
    style="background-image: url('./images/bgbanner.png');"
  >

    <div>
      <h1 class="text-6xl font-bold mb-5">
        Welcome to the <br>
        <span class="text-purple-400">ReTro</span> Forum
      </h1>

      <p class="mb-8 text-gray-300">
        Share your favorite opinion and win and wp forum coffee mug!
      </p>

      <div class="flex">
        <input class="px-4 py-2 rounded-l-full text-black" 
               type="text" 
               placeholder="Search here anything">
        <button class="bg-purple-500 px-6 rounded-r-full">
          Search
        </button>
      </div>
    </div>

    <div class="bg-white text-black p-8 rounded-2xl">
      <p>Registered Users 01</p>
      <p>Forum 05</p>
      <p>Topics 01</p>
      <p>Replies 01</p>
    </div>

  </div>
</section>
